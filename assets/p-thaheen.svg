<svg xmlns="http://www.w3.org/2000/svg" width="320" height="240" viewBox="0 0 320 240" fill="none" role="img" aria-label="Thaheen orange fox mascot">
  <defs>
    <radialGradient id="fx-halo" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#f97316" stop-opacity="0.35"/><stop offset="1" stop-color="#f97316" stop-opacity="0"/></radialGradient>
    <linearGradient id="fx-fur" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fb923c"/><stop offset="1" stop-color="#ea580c"/></linearGradient>
    <style>
      @keyframes fx-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
      @keyframes fx-blink{0%,92%,100%{transform:scaleY(1)}96%{transform:scaleY(0.1)}}
      @keyframes fx-tail{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(14deg)}}
      @keyframes fx-float{0%{transform:translateY(0);opacity:0}18%{opacity:1}100%{transform:translateY(-64px);opacity:0}}
      .fx-fox{transform-origin:160px 150px;animation:fx-bob 2.8s ease-in-out infinite}
      .fx-eyes{transform-origin:160px 118px;animation:fx-blink 4s ease-in-out infinite}
      .fx-tail{transform-origin:96px 168px;animation:fx-tail 2.4s ease-in-out infinite}
      .q1{animation:fx-float 3.6s ease-in-out infinite}
      .q2{animation:fx-float 3.6s ease-in-out 1.2s infinite}
      .q3{animation:fx-float 3.6s ease-in-out 2.4s infinite}
    </style>
  </defs>
  <rect width="320" height="240" rx="16" fill="#0a0e1a"/>
  <rect x="1" y="1" width="318" height="238" rx="15" fill="none" stroke="#1b2942"/>
  <ellipse cx="160" cy="150" rx="120" ry="110" fill="url(#fx-halo)"/>
  <g font-family="monospace" font-weight="800">
    <text class="q1" x="74" y="170" font-size="22" fill="#fb923c" opacity="0">?</text>
    <text class="q2" x="232" y="160" font-size="18" fill="#22d3ee" opacity="0">&#9733;</text>
    <text class="q3" x="118" y="150" font-size="16" fill="#fdba74" opacity="0">?</text>
  </g>
  <ellipse cx="160" cy="214" rx="62" ry="12" fill="#000" opacity="0.4"/>
  <g class="fx-fox">
    <g class="fx-tail"><path d="M104 150 Q60 150 56 192 Q92 188 112 168 Z" fill="url(#fx-fur)"/><path d="M62 188 Q78 186 96 174 Q86 192 66 192 Z" fill="#fde9d7"/></g>
    <path d="M120 150 Q160 132 200 150 L196 196 Q160 208 124 196 Z" fill="url(#fx-fur)"/>
    <path d="M138 168 Q160 160 182 168 L180 198 Q160 204 140 198 Z" fill="#fde9d7"/>
    <ellipse cx="142" cy="200" rx="12" ry="7" fill="#ea580c"/><ellipse cx="178" cy="200" rx="12" ry="7" fill="#ea580c"/>
    <g><path d="M128 104 L140 64 L162 96 Z" fill="url(#fx-fur)"/><path d="M138 92 L143 74 L152 92 Z" fill="#3a1d0a"/></g>
    <g><path d="M192 104 L180 64 L158 96 Z" fill="url(#fx-fur)"/><path d="M182 92 L177 74 L168 92 Z" fill="#3a1d0a"/></g>
    <path d="M118 112 Q160 92 202 112 Q204 146 160 158 Q116 146 118 112 Z" fill="url(#fx-fur)"/>
    <path d="M138 126 Q160 120 182 126 Q176 150 160 156 Q144 150 138 126 Z" fill="#fde9d7"/>
    <g class="fx-eyes"><circle cx="144" cy="120" r="5" fill="#2a1406"/><circle cx="176" cy="120" r="5" fill="#2a1406"/><circle cx="145.5" cy="118.5" r="1.6" fill="#fff"/><circle cx="177.5" cy="118.5" r="1.6" fill="#fff"/></g>
    <path d="M160 134 l-6 -4 h12 z" fill="#2a1406"/>
    <path d="M160 138 q-7 6 -13 2 M160 138 q7 6 13 2" stroke="#a8551f" stroke-width="2" fill="none" stroke-linecap="round"/>
    <g stroke="#fde9d7" stroke-width="1.4" opacity="0.8" stroke-linecap="round"><path d="M150 138 H120 M150 142 H124 M170 138 H200 M170 142 H196"/></g>
  </g>
  <text x="160" y="230" text-anchor="middle" font-family="monospace" font-size="11" fill="#fb923c">// thaheen — learn &amp; play</text>
</svg>
