<svg xmlns="http://www.w3.org/2000/svg" width="320" height="240" viewBox="0 0 320 240" fill="none" role="img" aria-label="Arabic bank check recognition">
  <defs>
    <linearGradient id="ck-paper" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#11304a"/><stop offset="1" stop-color="#0c2236"/></linearGradient>
    <filter id="ck-soft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.5"/></filter>
    <style>
      @keyframes ck-scan{0%{transform:translateY(0)}100%{transform:translateY(120px)}}
      @keyframes ck-box{0%,18%{opacity:0}28%,72%{opacity:1}85%,100%{opacity:0}}
      @keyframes ck-box2{0%,40%{opacity:0}50%,80%{opacity:1}92%,100%{opacity:0}}
      @keyframes ck-tick{0%,72%{opacity:0;transform:scale(.4)}80%{opacity:1;transform:scale(1.15)}88%,100%{opacity:1;transform:scale(1)}}
      .ck-scan{animation:ck-scan 3s ease-in-out infinite alternate}
      .ck-b1{animation:ck-box 4s ease-in-out infinite}
      .ck-b2{animation:ck-box2 4s ease-in-out infinite}
      .ck-tick{transform-origin:268px 70px;animation:ck-tick 4s ease-in-out infinite}
      .mono{font-family:"SFMono-Regular",Consolas,monospace}
    </style>
  </defs>
  <rect width="320" height="240" rx="16" fill="#0a0e1a"/>
  <rect x="1" y="1" width="318" height="238" rx="15" fill="none" stroke="#1b2942"/>
  <g transform="translate(40 60) skewY(-3)">
    <rect x="0" y="0" width="240" height="120" rx="8" fill="url(#ck-paper)" stroke="#22d3ee" stroke-opacity="0.4"/>
    <rect x="14" y="14" width="80" height="8" rx="4" fill="#2a4a66"/>
    <circle cx="214" cy="22" r="12" fill="none" stroke="#fb7185" stroke-width="2" stroke-dasharray="3 3"/>
    <rect x="14" y="44" width="150" height="7" rx="3.5" fill="#1f3e58"/>
    <text class="mono" x="158" y="74" text-anchor="end" font-size="13" fill="#a5c4dc">&#1636;&#1640;&#1634;&#1637; &#1585;&#1610;&#1575;&#1604;</text>
    <rect x="170" y="58" width="56" height="22" rx="3" fill="#0a1c2c" stroke="#2a4a66"/>
    <text class="mono" x="198" y="74" text-anchor="middle" font-size="13" fill="#cfe3f5">4825</text>
    <g class="ck-b1"><rect x="168" y="56" width="60" height="26" rx="2" fill="none" stroke="#22d3ee" stroke-width="1.6" stroke-dasharray="4 3"/><rect x="168" y="46" width="58" height="11" fill="#22d3ee"/><text class="mono" x="171" y="55" font-size="8" font-weight="700" fill="#04121a">digits 0.95</text></g>
    <g class="ck-b2"><rect x="40" y="62" width="120" height="20" rx="2" fill="none" stroke="#fb7185" stroke-width="1.6" stroke-dasharray="4 3"/><rect x="40" y="52" width="70" height="11" fill="#fb7185"/><text class="mono" x="43" y="61" font-size="8" font-weight="700" fill="#1a0509">legal CER</text></g>
  </g>
  <g class="ck-scan"><rect x="40" y="58" width="240" height="2.5" fill="#67e8f9" filter="url(#ck-soft)"/><rect x="40" y="58" width="240" height="1" fill="#a5f3fc"/></g>
  <g class="ck-tick"><circle cx="268" cy="70" r="16" fill="#0a2a1c" stroke="#34d399" stroke-width="2"/><path d="M260 70 l6 6 l11 -13" stroke="#34d399" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
  <g class="mono" font-size="9" fill="#7e93a8"><text x="160" y="206" text-anchor="middle" fill="#67e8f9">YOLOv8s &#8594; CRNN-CTC &#8594; char-CRNN &#8594; verifier</text><text x="160" y="224" text-anchor="middle">82.0% end-to-end &#183; beats 78.5% benchmark</text></g>
  <circle cx="30" cy="206" r="3" fill="#22d3ee"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.6s" repeatCount="indefinite"/></circle>
</svg>
