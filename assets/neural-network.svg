<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="900" height="180" viewBox="0 0 900 180">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="180" fill="url(#bg-grad)" rx="12"/>

  <!-- L1(x=90,y=[45,90,135]) → L2(x=300,y=[26,58,90,122,154]) -->
  <g stroke="#58A6FF" stroke-opacity="0.09" stroke-width="1" fill="none">
    <line x1="90" y1="45"  x2="300" y2="26"/> <line x1="90" y1="45"  x2="300" y2="58"/>
    <line x1="90" y1="45"  x2="300" y2="90"/> <line x1="90" y1="45"  x2="300" y2="122"/>
    <line x1="90" y1="45"  x2="300" y2="154"/><line x1="90" y1="90"  x2="300" y2="26"/>
    <line x1="90" y1="90"  x2="300" y2="58"/> <line x1="90" y1="90"  x2="300" y2="90"/>
    <line x1="90" y1="90"  x2="300" y2="122"/><line x1="90" y1="90"  x2="300" y2="154"/>
    <line x1="90" y1="135" x2="300" y2="26"/> <line x1="90" y1="135" x2="300" y2="58"/>
    <line x1="90" y1="135" x2="300" y2="90"/> <line x1="90" y1="135" x2="300" y2="122"/>
    <line x1="90" y1="135" x2="300" y2="154"/>
  </g>

  <!-- L2(x=300) → L3(x=600) -->
  <g stroke="#58A6FF" stroke-opacity="0.065" stroke-width="1" fill="none">
    <line x1="300" y1="26"  x2="600" y2="26"/> <line x1="300" y1="26"  x2="600" y2="58"/>
    <line x1="300" y1="26"  x2="600" y2="90"/> <line x1="300" y1="26"  x2="600" y2="122"/>
    <line x1="300" y1="26"  x2="600" y2="154"/><line x1="300" y1="58"  x2="600" y2="26"/>
    <line x1="300" y1="58"  x2="600" y2="58"/> <line x1="300" y1="58"  x2="600" y2="90"/>
    <line x1="300" y1="58"  x2="600" y2="122"/><line x1="300" y1="58"  x2="600" y2="154"/>
    <line x1="300" y1="90"  x2="600" y2="26"/> <line x1="300" y1="90"  x2="600" y2="58"/>
    <line x1="300" y1="90"  x2="600" y2="90"/> <line x1="300" y1="90"  x2="600" y2="122"/>
    <line x1="300" y1="90"  x2="600" y2="154"/><line x1="300" y1="122" x2="600" y2="26"/>
    <line x1="300" y1="122" x2="600" y2="58"/> <line x1="300" y1="122" x2="600" y2="90"/>
    <line x1="300" y1="122" x2="600" y2="122"/><line x1="300" y1="122" x2="600" y2="154"/>
    <line x1="300" y1="154" x2="600" y2="26"/> <line x1="300" y1="154" x2="600" y2="58"/>
    <line x1="300" y1="154" x2="600" y2="90"/> <line x1="300" y1="154" x2="600" y2="122"/>
    <line x1="300" y1="154" x2="600" y2="154"/>
  </g>

  <!-- L3(x=600) → L4(x=810,y=[75,105]) -->
  <g stroke="#58A6FF" stroke-opacity="0.09" stroke-width="1" fill="none">
    <line x1="600" y1="26"  x2="810" y2="75"/> <line x1="600" y1="26"  x2="810" y2="105"/>
    <line x1="600" y1="58"  x2="810" y2="75"/> <line x1="600" y1="58"  x2="810" y2="105"/>
    <line x1="600" y1="90"  x2="810" y2="75"/> <line x1="600" y1="90"  x2="810" y2="105"/>
    <line x1="600" y1="122" x2="810" y2="75"/> <line x1="600" y1="122" x2="810" y2="105"/>
    <line x1="600" y1="154" x2="810" y2="75"/> <line x1="600" y1="154" x2="810" y2="105"/>
  </g>

  <!-- Animation paths (invisible) -->
  <path id="p1"  d="M90,45  L300,26"  fill="none" stroke="none"/>
  <path id="p2"  d="M90,45  L300,90"  fill="none" stroke="none"/>
  <path id="p3"  d="M90,90  L300,58"  fill="none" stroke="none"/>
  <path id="p4"  d="M90,90  L300,122" fill="none" stroke="none"/>
  <path id="p5"  d="M90,135 L300,154" fill="none" stroke="none"/>
  <path id="p6"  d="M300,26  L600,26"  fill="none" stroke="none"/>
  <path id="p7"  d="M300,26  L600,90"  fill="none" stroke="none"/>
  <path id="p8"  d="M300,58  L600,58"  fill="none" stroke="none"/>
  <path id="p9"  d="M300,58  L600,122" fill="none" stroke="none"/>
  <path id="p10" d="M300,90  L600,90"  fill="none" stroke="none"/>
  <path id="p11" d="M300,90  L600,26"  fill="none" stroke="none"/>
  <path id="p12" d="M300,90  L600,154" fill="none" stroke="none"/>
  <path id="p13" d="M300,122 L600,58"  fill="none" stroke="none"/>
  <path id="p14" d="M300,122 L600,122" fill="none" stroke="none"/>
  <path id="p15" d="M300,154 L600,90"  fill="none" stroke="none"/>
  <path id="p16" d="M600,26  L810,75"  fill="none" stroke="none"/>
  <path id="p17" d="M600,58  L810,75"  fill="none" stroke="none"/>
  <path id="p18" d="M600,90  L810,75"  fill="none" stroke="none"/>
  <path id="p19" d="M600,90  L810,105" fill="none" stroke="none"/>
  <path id="p20" d="M600,154 L810,105" fill="none" stroke="none"/>

  <!-- Animated pulses — L1→L2 (blue) -->
  <circle r="2.5" fill="#58A6FF" filter="url(#glow)">
    <animateMotion dur="1.6s" repeatCount="indefinite" begin="0s"><mpath xlink:href="#p1"/></animateMotion>
    <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.12;0.88;1" dur="1.6s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle r="2.5" fill="#58A6FF" filter="url(#glow)">
    <animateMotion dur="2.0s" repeatCount="indefinite" begin="0.8s"><mpath xlink:href="#p2"/></animateMotion>
    <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.12;0.88;1" dur="2.0s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <circle r="2.5" fill="#58A6FF" filter="url(#glow)">
    <animateMotion dur="1.8s" repeatCount="indefinite" begin="0.4s"><mpath xlink:href="#p3"/></animateMotion>
    <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.12;0.88;1" dur="1.8s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  <circle r="2.5" fill="#58A6FF" filter="url(#glow)">
    <animateMotion dur="2.2s" repeatCount="indefinite" begin="1.2s"><mpath xlink:href="#p4"/></animateMotion>
    <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.12;0.88;1" dur="2.2s" repeatCount="indefinite" begin="1.2s"/>
  </circle>
  <circle r="2.5" fill="#58A6FF" filter="url(#glow)">
    <animateMotion dur="1.7s" repeatCount="indefinite" begin="0.6s"><mpath xlink:href="#p5"/></animateMotion>
    <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.12;0.88;1" dur="1.7s" repeatCount="indefinite" begin="0.6s"/>
  </circle>

  <!-- Animated pulses — L2→L3 (green) -->
  <circle r="2.5" fill="#7ee787" filter="url(#glow)">
    <animateMotion dur="2.4s" repeatCount="indefinite" begin="0.3s"><mpath xlink:href="#p6"/></animateMotion>
    <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.1;0.9;1" dur="2.4s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle r="2.5" fill="#58A6FF" filter="url(#glow)">
    <animateMotion dur="2.8s" repeatCount="indefinite" begin="1.0s"><mpath xlink:href="#p7"/></animateMotion>
    <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.1;0.9;1" dur="2.8s" repeatCount="indefinite" begin="1.0s"/>
  </circle>
  <circle r="2.5" fill="#7ee787" filter="url(#glow)">
    <animateMotion dur="2.0s" repeatCount="indefinite" begin="0.7s"><mpath xlink:href="#p8"/></animateMotion>
    <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.1;0.9;1" dur="2.0s" repeatCount="indefinite" begin="0.7s"/>
  </circle>
  <circle r="2.5" fill="#58A6FF" filter="url(#glow)">
    <animateMotion dur="2.6s" repeatCount="indefinite" begin="0.1s"><mpath xlink:href="#p9"/></animateMotion>
    <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.1;0.9;1" dur="2.6s" repeatCount="indefinite" begin="0.1s"/>
  </circle>
  <circle r="2.5" fill="#7ee787" filter="url(#glow)">
    <animateMotion dur="2.2s" repeatCount="indefinite" begin="0.5s"><mpath xlink:href="#p10"/></animateMotion>
    <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.1;0.9;1" dur="2.2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle r="2.5" fill="#58A6FF" filter="url(#glow)">
    <animateMotion dur="2.8s" repeatCount="indefinite" begin="1.3s"><mpath xlink:href="#p11"/></animateMotion>
    <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.1;0.9;1" dur="2.8s" repeatCount="indefinite" begin="1.3s"/>
  </circle>
  <circle r="2.5" fill="#7ee787" filter="url(#glow)">
    <animateMotion dur="3.0s" repeatCount="indefinite" begin="0.9s"><mpath xlink:href="#p12"/></animateMotion>
    <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.1;0.9;1" dur="3.0s" repeatCount="indefinite" begin="0.9s"/>
  </circle>
  <circle r="2.5" fill="#58A6FF" filter="url(#glow)">
    <animateMotion dur="2.0s" repeatCount="indefinite" begin="0.2s"><mpath xlink:href="#p13"/></animateMotion>
    <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.1;0.9;1" dur="2.0s" repeatCount="indefinite" begin="0.2s"/>
  </circle>
  <circle r="2.5" fill="#7ee787" filter="url(#glow)">
    <animateMotion dur="2.4s" repeatCount="indefinite" begin="0.8s"><mpath xlink:href="#p14"/></animateMotion>
    <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.1;0.9;1" dur="2.4s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <circle r="2.5" fill="#58A6FF" filter="url(#glow)">
    <animateMotion dur="2.6s" repeatCount="indefinite" begin="1.1s"><mpath xlink:href="#p15"/></animateMotion>
    <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.1;0.9;1" dur="2.6s" repeatCount="indefinite" begin="1.1s"/>
  </circle>

  <!-- Animated pulses — L3→L4 (orange-red) -->
  <circle r="2.5" fill="#f78166" filter="url(#glow)">
    <animateMotion dur="1.6s" repeatCount="indefinite" begin="0.4s"><mpath xlink:href="#p16"/></animateMotion>
    <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.12;0.88;1" dur="1.6s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  <circle r="2.5" fill="#f78166" filter="url(#glow)">
    <animateMotion dur="1.8s" repeatCount="indefinite" begin="0.9s"><mpath xlink:href="#p17"/></animateMotion>
    <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.12;0.88;1" dur="1.8s" repeatCount="indefinite" begin="0.9s"/>
  </circle>
  <circle r="2.5" fill="#f78166" filter="url(#glow)">
    <animateMotion dur="2.0s" repeatCount="indefinite" begin="0.2s"><mpath xlink:href="#p18"/></animateMotion>
    <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.12;0.88;1" dur="2.0s" repeatCount="indefinite" begin="0.2s"/>
  </circle>
  <circle r="2.5" fill="#f78166" filter="url(#glow)">
    <animateMotion dur="2.2s" repeatCount="indefinite" begin="1.0s"><mpath xlink:href="#p19"/></animateMotion>
    <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.12;0.88;1" dur="2.2s" repeatCount="indefinite" begin="1.0s"/>
  </circle>
  <circle r="2.5" fill="#f78166" filter="url(#glow)">
    <animateMotion dur="1.7s" repeatCount="indefinite" begin="0.6s"><mpath xlink:href="#p20"/></animateMotion>
    <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.12;0.88;1" dur="1.7s" repeatCount="indefinite" begin="0.6s"/>
  </circle>

  <!-- Nodes — Layer 1 (Input, blue) -->
  <g filter="url(#nglow)">
    <circle cx="90" cy="45"  r="7" fill="#161b22" stroke="#58A6FF" stroke-width="1.5" stroke-opacity="0.85"/>
    <circle cx="90" cy="45"  r="2.8" fill="#58A6FF" opacity="0.55"/>
    <circle cx="90" cy="90"  r="7" fill="#161b22" stroke="#58A6FF" stroke-width="1.5" stroke-opacity="0.85"/>
    <circle cx="90" cy="90"  r="2.8" fill="#58A6FF" opacity="0.55"/>
    <circle cx="90" cy="135" r="7" fill="#161b22" stroke="#58A6FF" stroke-width="1.5" stroke-opacity="0.85"/>
    <circle cx="90" cy="135" r="2.8" fill="#58A6FF" opacity="0.55"/>
  </g>

  <!-- Nodes — Layer 2 (Hidden 1, green) -->
  <g filter="url(#nglow)">
    <circle cx="300" cy="26"  r="7" fill="#161b22" stroke="#7ee787" stroke-width="1.5" stroke-opacity="0.75"/>
    <circle cx="300" cy="58"  r="7" fill="#161b22" stroke="#7ee787" stroke-width="1.5" stroke-opacity="0.75"/>
    <circle cx="300" cy="90"  r="7" fill="#161b22" stroke="#7ee787" stroke-width="1.5" stroke-opacity="0.75"/>
    <circle cx="300" cy="122" r="7" fill="#161b22" stroke="#7ee787" stroke-width="1.5" stroke-opacity="0.75"/>
    <circle cx="300" cy="154" r="7" fill="#161b22" stroke="#7ee787" stroke-width="1.5" stroke-opacity="0.75"/>
  </g>

  <!-- Nodes — Layer 3 (Hidden 2, green) -->
  <g filter="url(#nglow)">
    <circle cx="600" cy="26"  r="7" fill="#161b22" stroke="#7ee787" stroke-width="1.5" stroke-opacity="0.75"/>
    <circle cx="600" cy="58"  r="7" fill="#161b22" stroke="#7ee787" stroke-width="1.5" stroke-opacity="0.75"/>
    <circle cx="600" cy="90"  r="7" fill="#161b22" stroke="#7ee787" stroke-width="1.5" stroke-opacity="0.75"/>
    <circle cx="600" cy="122" r="7" fill="#161b22" stroke="#7ee787" stroke-width="1.5" stroke-opacity="0.75"/>
    <circle cx="600" cy="154" r="7" fill="#161b22" stroke="#7ee787" stroke-width="1.5" stroke-opacity="0.75"/>
  </g>

  <!-- Nodes — Layer 4 (Output, orange-red with pulse) -->
  <g filter="url(#nglow)">
    <circle cx="810" cy="75"  r="7" fill="#161b22" stroke="#f78166" stroke-width="1.5" stroke-opacity="0.9">
      <animate attributeName="r" values="7;8.5;7" dur="2.0s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="810" cy="75"  r="3" fill="#f78166" opacity="0.75">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="810" cy="105" r="7" fill="#161b22" stroke="#f78166" stroke-width="1.5" stroke-opacity="0.9">
      <animate attributeName="r" values="7;8.5;7" dur="2.4s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.4s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="810" cy="105" r="3" fill="#f78166" opacity="0.75">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.4s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
  </g>

  <!-- Layer labels -->
  <text x="90"  y="173" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="8.5" letter-spacing="1.5">INPUT</text>
  <text x="300" y="173" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="8.5" letter-spacing="1.5">HIDDEN</text>
  <text x="600" y="173" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="8.5" letter-spacing="1.5">HIDDEN</text>
  <text x="810" y="173" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="8.5" letter-spacing="1.5">OUTPUT</text>

</svg>
