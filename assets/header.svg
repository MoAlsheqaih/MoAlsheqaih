<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="900" height="300" viewBox="0 0 900 300" fill="none" role="img" aria-label="Mohammed Al Sheqaih — AI/ML Engineer, Software Engineer, Building AI for the Arabic World">
<defs>
<linearGradient id="mh-name" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0" stop-color="#58A6FF"/>
  <stop offset="0.33" stop-color="#22D3EE"/>
  <stop offset="0.66" stop-color="#7ee787"/>
  <stop offset="1" stop-color="#f78166"/>
  <animateTransform attributeName="gradientTransform" type="translate" values="-1 0;1 0;-1 0" dur="6s" repeatCount="indefinite"/>
</linearGradient>
<linearGradient id="mh-shine" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
  <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.85"/>
  <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
</linearGradient>
<radialGradient id="mh-blob0" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#58A6FF" stop-opacity="0.45"/><stop offset="1" stop-color="#58A6FF" stop-opacity="0"/></radialGradient>
<radialGradient id="mh-blob1" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#7ee787" stop-opacity="0.40"/><stop offset="1" stop-color="#7ee787" stop-opacity="0"/></radialGradient>
<radialGradient id="mh-blob2" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#f78166" stop-opacity="0.40"/><stop offset="1" stop-color="#f78166" stop-opacity="0"/></radialGradient>
<radialGradient id="mh-blob3" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#a78bfa" stop-opacity="0.32"/><stop offset="1" stop-color="#a78bfa" stop-opacity="0"/></radialGradient>
<filter id="mh-blur" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="28"/></filter>
<filter id="mh-glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.6"/></filter>
<filter id="mh-strong-glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="3.5"/></filter>
<clipPath id="mh-nameclip"><text x="378" y="118" class="sans" font-size="42" font-weight="800">Mohammed Al Sheqaih</text></clipPath>
<pattern id="mh-dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
  <circle cx="2" cy="2" r="0.7" fill="#58A6FF" fill-opacity="0.18"/>
</pattern>

<!-- Neural network animation paths (invisible) -->
<path id="np1" d="M70,100 L190,80" fill="none"/>
<path id="np2" d="M70,100 L190,130" fill="none"/>
<path id="np3" d="M70,150 L190,130" fill="none"/>
<path id="np4" d="M70,150 L190,170" fill="none"/>
<path id="np5" d="M70,200 L190,170" fill="none"/>
<path id="np6" d="M70,200 L190,220" fill="none"/>
<path id="np7" d="M190,80 L310,130"  fill="none"/>
<path id="np8" d="M190,130 L310,130" fill="none"/>
<path id="np9" d="M190,170 L310,170" fill="none"/>
<path id="np10" d="M190,220 L310,170" fill="none"/>
<path id="np11" d="M190,130 L310,170" fill="none"/>
<path id="np12" d="M190,170 L310,130" fill="none"/>

<style>
@keyframes mh-blob{0%,100%{transform:translate(0,0)}50%{transform:translate(28px,-18px)}}
@keyframes mh-blob2{0%,100%{transform:translate(0,0)}50%{transform:translate(-32px,18px)}}
@keyframes mh-blob3{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,22px)}}
@keyframes mh-node{0%,100%{r:3;opacity:0.7}50%{r:4.5;opacity:1}}
@keyframes mh-out-node{0%,100%{r:5.5;opacity:0.8}50%{r:7;opacity:1}}
@keyframes mh-blink{0%,55%{opacity:1}75%,100%{opacity:0}}
@keyframes mh-shine{0%{transform:translateX(-280px)}100%{transform:translateX(520px)}}
@keyframes mh-glow{0%,100%{opacity:.55}50%{opacity:1}}
@keyframes mh-badge{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
.blob1{transform-box:fill-box;transform-origin:center;animation:mh-blob 11s ease-in-out infinite}
.blob2{transform-box:fill-box;transform-origin:center;animation:mh-blob2 13s ease-in-out infinite}
.blob3{transform-box:fill-box;transform-origin:center;animation:mh-blob3 14s ease-in-out infinite}
.node{animation:mh-node 3s ease-in-out infinite}
.out-node{animation:mh-out-node 2.4s ease-in-out infinite}
.cur{animation:mh-blink 1.1s step-end infinite}
.shine{animation:mh-shine 3.4s ease-in-out infinite}
.bglow{animation:mh-glow 2.6s ease-in-out infinite}
.b1{animation:mh-badge 3.6s ease-in-out infinite}
.b2{animation:mh-badge 3.6s ease-in-out infinite -0.9s}
.b3{animation:mh-badge 3.6s ease-in-out infinite -1.8s}
.b4{animation:mh-badge 3.6s ease-in-out infinite -2.7s}
.mono{font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace}
.sans{font-family:"Segoe UI","Helvetica Neue",Arial,sans-serif}
</style>
</defs>

<!-- Background -->
<rect width="900" height="300" rx="16" fill="#0d1117"/>
<rect width="900" height="300" rx="16" fill="url(#mh-dots)"/>

<!-- Color blobs (animated, blurred) -->
<g filter="url(#mh-blur)">
  <circle class="blob1" cx="200" cy="170" r="120" fill="url(#mh-blob0)"/>
  <circle class="blob2" cx="620" cy="100" r="130" fill="url(#mh-blob1)"/>
  <circle class="blob1" cx="780" cy="220" r="110" fill="url(#mh-blob2)"/>
  <circle class="blob3" cx="430" cy="260" r="120" fill="url(#mh-blob3)"/>
</g>

<!-- ============ LEFT: NEURAL NETWORK ============ -->
<g>
  <!-- Connection lines (low opacity) -->
  <g stroke="#58A6FF" stroke-opacity="0.13" stroke-width="1" fill="none">
    <line x1="70" y1="100" x2="190" y2="80"/>
    <line x1="70" y1="100" x2="190" y2="130"/>
    <line x1="70" y1="100" x2="190" y2="170"/>
    <line x1="70" y1="100" x2="190" y2="220"/>
    <line x1="70" y1="150" x2="190" y2="80"/>
    <line x1="70" y1="150" x2="190" y2="130"/>
    <line x1="70" y1="150" x2="190" y2="170"/>
    <line x1="70" y1="150" x2="190" y2="220"/>
    <line x1="70" y1="200" x2="190" y2="80"/>
    <line x1="70" y1="200" x2="190" y2="130"/>
    <line x1="70" y1="200" x2="190" y2="170"/>
    <line x1="70" y1="200" x2="190" y2="220"/>
    <line x1="190" y1="80" x2="310" y2="130"/>
    <line x1="190" y1="80" x2="310" y2="170"/>
    <line x1="190" y1="130" x2="310" y2="130"/>
    <line x1="190" y1="130" x2="310" y2="170"/>
    <line x1="190" y1="170" x2="310" y2="130"/>
    <line x1="190" y1="170" x2="310" y2="170"/>
    <line x1="190" y1="220" x2="310" y2="130"/>
    <line x1="190" y1="220" x2="310" y2="170"/>
  </g>

  <!-- Animated pulse dots -->
  <circle r="2.5" fill="#58A6FF" filter="url(#mh-glow)">
    <animateMotion dur="1.8s" repeatCount="indefinite" begin="0s"><mpath xlink:href="#np1"/></animateMotion>
    <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.15;0.85;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.5" fill="#58A6FF" filter="url(#mh-glow)">
    <animateMotion dur="2.0s" repeatCount="indefinite" begin="0.5s"><mpath xlink:href="#np3"/></animateMotion>
    <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.15;0.85;1" dur="2.0s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle r="2.5" fill="#58A6FF" filter="url(#mh-glow)">
    <animateMotion dur="1.7s" repeatCount="indefinite" begin="0.9s"><mpath xlink:href="#np6"/></animateMotion>
    <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.15;0.85;1" dur="1.7s" repeatCount="indefinite" begin="0.9s"/>
  </circle>
  <circle r="2.5" fill="#7ee787" filter="url(#mh-glow)">
    <animateMotion dur="2.2s" repeatCount="indefinite" begin="0.3s"><mpath xlink:href="#np7"/></animateMotion>
    <animate attributeName="opacity" values="0;0.85;0.85;0" keyTimes="0;0.12;0.88;1" dur="2.2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle r="2.5" fill="#7ee787" filter="url(#mh-glow)">
    <animateMotion dur="2.0s" repeatCount="indefinite" begin="1.1s"><mpath xlink:href="#np8"/></animateMotion>
    <animate attributeName="opacity" values="0;0.85;0.85;0" keyTimes="0;0.12;0.88;1" dur="2.0s" repeatCount="indefinite" begin="1.1s"/>
  </circle>
  <circle r="2.5" fill="#7ee787" filter="url(#mh-glow)">
    <animateMotion dur="2.4s" repeatCount="indefinite" begin="0.7s"><mpath xlink:href="#np10"/></animateMotion>
    <animate attributeName="opacity" values="0;0.85;0.85;0" keyTimes="0;0.12;0.88;1" dur="2.4s" repeatCount="indefinite" begin="0.7s"/>
  </circle>

  <!-- Layer 1 (input) -->
  <g filter="url(#mh-strong-glow)">
    <circle class="node" cx="70" cy="100" r="3.6" fill="#58A6FF"/>
    <circle class="node" cx="70" cy="150" r="3.6" fill="#58A6FF" style="animation-delay:-1s"/>
    <circle class="node" cx="70" cy="200" r="3.6" fill="#58A6FF" style="animation-delay:-2s"/>
  </g>
  <!-- Layer 2 (hidden) -->
  <g filter="url(#mh-strong-glow)">
    <circle class="node" cx="190" cy="80" r="3.6" fill="#7ee787" style="animation-delay:-0.4s"/>
    <circle class="node" cx="190" cy="130" r="3.6" fill="#7ee787" style="animation-delay:-1.2s"/>
    <circle class="node" cx="190" cy="170" r="3.6" fill="#7ee787" style="animation-delay:-0.8s"/>
    <circle class="node" cx="190" cy="220" r="3.6" fill="#7ee787" style="animation-delay:-1.6s"/>
  </g>
  <!-- Layer 3 (output) -->
  <g filter="url(#mh-strong-glow)">
    <circle class="out-node" cx="310" cy="130" r="6" fill="#f78166"/>
    <circle class="out-node" cx="310" cy="170" r="6" fill="#f78166" style="animation-delay:-1.2s"/>
  </g>
  <!-- Small layer labels -->
  <text x="70" y="245" text-anchor="middle" fill="#484f58" class="mono" font-size="9" letter-spacing="1.5">INPUT</text>
  <text x="190" y="245" text-anchor="middle" fill="#484f58" class="mono" font-size="9" letter-spacing="1.5">HIDDEN</text>
  <text x="310" y="245" text-anchor="middle" fill="#484f58" class="mono" font-size="9" letter-spacing="1.5">OUTPUT</text>
</g>

<!-- Divider -->
<line x1="365" y1="65" x2="365" y2="235" stroke="#58A6FF" stroke-opacity="0.18" stroke-width="1"/>

<!-- ============ RIGHT: TEXT CONTENT ============ -->

<!-- Name (gradient + shine sweep) -->
<text x="395" y="118" class="sans" font-size="42" font-weight="800" fill="url(#mh-name)">Mohammed Al Sheqaih</text>
<g clip-path="url(#mh-nameclip)">
  <rect class="shine" x="0" y="86" width="160" height="40" fill="url(#mh-shine)" opacity="0.7"/>
</g>

<!-- Role line (terminal style) -->
<g transform="translate(395, 152)">
  <text x="0" y="0" class="mono" font-size="15" font-weight="600" fill="#22D3EE">&gt;</text>
  <text x="18" y="0" class="mono" font-size="15" fill="#c9d1d9">AI/ML Engineer</text>
  <text x="160" y="0" class="mono" font-size="15" fill="#8b949e">·</text>
  <text x="172" y="0" class="mono" font-size="15" fill="#c9d1d9">Software Engineer</text>
  <rect class="cur" x="348" y="-12" width="8" height="15" fill="#22D3EE"/>
</g>

<!-- Tagline -->
<text x="395" y="184" class="sans" font-size="14" fill="#8b949e" font-style="italic">Building AI for the Arabic world · Research-grade ML × production engineering</text>

<!-- 4 badges -->
<g transform="translate(395, 220)">
  <g class="b1">
    <rect x="0" y="0" width="78" height="26" rx="13" fill="none" stroke="#58A6FF" stroke-opacity="0.7" stroke-width="1.2"/>
    <text x="39" y="17.5" text-anchor="middle" class="sans" font-size="11" font-weight="600" fill="#58A6FF">KFUPM</text>
  </g>
  <g class="b2" transform="translate(86, 0)">
    <rect x="0" y="0" width="78" height="26" rx="13" fill="none" stroke="#7ee787" stroke-opacity="0.7" stroke-width="1.2"/>
    <text x="39" y="17.5" text-anchor="middle" class="sans" font-size="11" font-weight="600" fill="#7ee787">Qimam</text>
  </g>
  <g class="b3" transform="translate(172, 0)">
    <rect x="0" y="0" width="98" height="26" rx="13" fill="none" stroke="#f78166" stroke-opacity="0.7" stroke-width="1.2"/>
    <text x="49" y="17.5" text-anchor="middle" class="sans" font-size="11" font-weight="600" fill="#f78166">Halliburton</text>
  </g>
  <g class="b4" transform="translate(278, 0)">
    <rect x="0" y="0" width="78" height="26" rx="13" fill="none" stroke="#a78bfa" stroke-opacity="0.7" stroke-width="1.2"/>
    <text x="39" y="17.5" text-anchor="middle" class="sans" font-size="11" font-weight="600" fill="#a78bfa">NeurIPS</text>
  </g>
</g>

<!-- Subtle border -->
<rect x="0.5" y="0.5" width="899" height="299" rx="16" fill="none" stroke="#21262d" stroke-width="1"/>

</svg>
