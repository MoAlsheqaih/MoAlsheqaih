<svg xmlns="http://www.w3.org/2000/svg" width="320" height="240" viewBox="0 0 320 240" fill="none" role="img" aria-label="Saudi sign language recognition">
  <defs>
    <radialGradient id="sp-halo" cx="0.5" cy="0.5" r="0.55"><stop offset="0" stop-color="#fb7185" stop-opacity="0.25"/><stop offset="1" stop-color="#fb7185" stop-opacity="0"/></radialGradient>
    <style>
      @keyframes sp-armR{0%,100%{transform:rotate(0)}50%{transform:rotate(-26deg)}}
      @keyframes sp-armF{0%,100%{transform:rotate(0)}50%{transform:rotate(30deg)}}
      @keyframes sp-joint{0%,100%{r:3.4;opacity:.85}50%{r:5;opacity:1}}
      @keyframes sp-gloss{0%,20%{opacity:0;transform:translateY(6px)}35%,80%{opacity:1;transform:translateY(0)}95%,100%{opacity:0}}
      @keyframes sp-scan{0%{transform:translateX(0)}100%{transform:translateX(150px)}}
      .sp-upperR{transform-origin:160px 96px;animation:sp-armR 2.6s ease-in-out infinite}
      .sp-foreR{transform-origin:192px 120px;animation:sp-armF 2.6s ease-in-out infinite}
      .joint{animation:sp-joint 2.2s ease-in-out infinite}
      .sp-gloss{animation:sp-gloss 3.2s ease-in-out infinite}
      .sp-scan{animation:sp-scan 3s ease-in-out infinite alternate}
      .mono{font-family:"SFMono-Regular",Consolas,monospace}
    </style>
  </defs>
  <rect width="320" height="240" rx="16" fill="#0a0e1a"/>
  <rect x="1" y="1" width="318" height="238" rx="15" fill="none" stroke="#1b2942"/>
  <ellipse cx="160" cy="120" rx="130" ry="110" fill="url(#sp-halo)"/>
  <g class="sp-scan"><rect x="56" y="40" width="2" height="150" fill="#67e8f9" opacity="0.5"/></g>
  <g stroke="#22d3ee" stroke-width="3" stroke-linecap="round">
    <line x1="160" y1="96" x2="160" y2="150"/><line x1="160" y1="150" x2="138" y2="194"/><line x1="160" y1="150" x2="182" y2="194"/>
    <line x1="160" y1="104" x2="128" y2="122"/><line x1="128" y1="122" x2="120" y2="150"/>
    <g class="sp-upperR"><line x1="160" y1="104" x2="192" y2="120"/><g class="sp-foreR"><line x1="192" y1="120" x2="214" y2="146"/></g></g>
  </g>
  <g fill="#fb7185">
    <circle class="joint" cx="160" cy="96" r="3.6"/><circle class="joint" cx="160" cy="150" r="3.6" style="animation-delay:.3s"/><circle class="joint" cx="128" cy="122" r="3.6" style="animation-delay:.5s"/><circle class="joint" cx="120" cy="150" r="3.6" style="animation-delay:.7s"/><circle class="joint" cx="192" cy="120" r="3.6" style="animation-delay:.4s"/><circle class="joint" cx="214" cy="146" r="4.4" fill="#fda4af" style="animation-delay:.6s"/><circle class="joint" cx="138" cy="194" r="3.6" style="animation-delay:.2s"/><circle class="joint" cx="182" cy="194" r="3.6" style="animation-delay:.8s"/>
  </g>
  <circle cx="160" cy="84" r="13" fill="#0e1f33" stroke="#22d3ee" stroke-width="2.5"/>
  <g class="sp-gloss"><rect x="226" y="150" width="74" height="26" rx="13" fill="#0e1f33" stroke="#fb7185" stroke-opacity="0.6"/><text class="mono" x="263" y="167" text-anchor="middle" font-size="12" fill="#fda4af">&#1605;&#1585;&#1581;&#1576;&#1575;</text></g>
  <text class="mono" x="160" y="214" text-anchor="middle" font-size="9" fill="#67e8f9">3D pose &#8594; BiLSTM / Conformer &#8594; CTC</text>
  <text class="mono" x="160" y="230" text-anchor="middle" font-size="9" fill="#7e93a8">continuous Arabic gloss</text>
</svg>
