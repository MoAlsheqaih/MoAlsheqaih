<svg xmlns="http://www.w3.org/2000/svg" width="320" height="240" viewBox="0 0 320 240" fill="none" role="img" aria-label="Zero-shot object insertion diffusion">
  <defs>
    <radialGradient id="df-halo" cx="0.5" cy="0.5" r="0.6"><stop offset="0" stop-color="#a78bfa" stop-opacity="0.3"/><stop offset="1" stop-color="#a78bfa" stop-opacity="0"/></radialGradient>
    <linearGradient id="df-obj" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#67e8f9"/><stop offset="1" stop-color="#22d3ee"/></linearGradient>
    <linearGradient id="df-obj2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#0e7490"/></linearGradient>
    <style>
      @keyframes df-noise{0%,15%{opacity:1}55%,100%{opacity:0}}
      @keyframes df-obj{0%,30%{opacity:0;transform:scale(.6)}60%{opacity:1;transform:scale(1.05)}70%,92%{opacity:1;transform:scale(1)}100%{opacity:0}}
      @keyframes df-spin{to{transform:rotate(360deg)}}
      @keyframes df-merge{0%,100%{transform:translateX(0)}50%{transform:translateX(14px)}}
      @keyframes df-merge2{0%,100%{transform:translateX(0)}50%{transform:translateX(-14px)}}
      .df-noise{animation:df-noise 4.5s ease-in-out infinite}
      .df-obj{transform-origin:160px 116px;animation:df-obj 4.5s ease-in-out infinite}
      .df-ring{transform-origin:160px 116px;animation:df-spin 8s linear infinite}
      .df-tk1{animation:df-merge 3s ease-in-out infinite}
      .df-tk2{animation:df-merge2 3s ease-in-out infinite}
      .mono{font-family:"SFMono-Regular",Consolas,monospace}
    </style>
  </defs>
  <rect width="320" height="240" rx="16" fill="#0a0e1a"/>
  <rect x="1" y="1" width="318" height="238" rx="15" fill="none" stroke="#1b2942"/>
  <ellipse cx="160" cy="116" rx="130" ry="100" fill="url(#df-halo)"/>
  <rect x="96" y="52" width="128" height="128" rx="8" fill="#0c1424" stroke="#2a3b57" stroke-width="1.5"/>
  <text class="mono" x="160" y="46" text-anchor="middle" font-size="9" fill="#7e93a8">scene + inserted object</text>
  <g class="df-ring"><circle cx="160" cy="116" r="52" fill="none" stroke="#a78bfa" stroke-opacity="0.35" stroke-width="1.4" stroke-dasharray="3 6"/></g>
  <g class="df-noise" fill="#8b9bb4">
    <circle cx="128" cy="92" r="2"/><circle cx="150" cy="80" r="1.6"/><circle cx="176" cy="86" r="2.2"/><circle cx="196" cy="104" r="1.5"/><circle cx="120" cy="120" r="1.8"/><circle cx="142" cy="132" r="2.1"/><circle cx="168" cy="140" r="1.6"/><circle cx="192" cy="134" r="2"/><circle cx="134" cy="150" r="1.5"/><circle cx="180" cy="120" r="1.7"/><circle cx="156" cy="108" r="2"/><circle cx="200" cy="150" r="1.6"/>
  </g>
  <g class="df-obj">
    <polygon points="160,84 192,102 160,120 128,102" fill="url(#df-obj)"/>
    <polygon points="128,102 160,120 160,156 128,138" fill="url(#df-obj2)"/>
    <polygon points="192,102 160,120 160,156 192,138" fill="#0e7490"/>
    <polygon points="160,84 192,102 160,120 128,102" fill="none" stroke="#a5f3fc" stroke-opacity="0.7"/>
  </g>
  <g class="mono" font-size="9" font-weight="700">
    <g class="df-tk1"><circle cx="42" cy="116" r="13" fill="#0e1f33" stroke="#22d3ee"/><text x="42" y="119" text-anchor="middle" fill="#67e8f9">DINO</text></g>
    <g class="df-tk2"><circle cx="278" cy="116" r="13" fill="#0e1f33" stroke="#fb7185"/><text x="278" y="119" text-anchor="middle" fill="#fda4af">CLIP</text></g>
  </g>
  <text class="mono" x="160" y="214" text-anchor="middle" font-size="9" fill="#7e93a8">LoRA-8 &#183; token fusion</text>
  <text class="mono" x="160" y="228" text-anchor="middle" font-size="9" fill="#67e8f9">harmonization 0.578 &#8594; 0.655</text>
</svg>
